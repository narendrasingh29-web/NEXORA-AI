name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: |
          mkdir -p app/src/main/java/com/nexora/ai
          mkdir -p app/src/main/res/values

          echo "rootProject.name='NEXORA'" > settings.gradle

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.nexora.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.nexora.ai'
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="NEXORA AI">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/nexora/ai/MainActivity.java <<'EOF'
          package com.nexora.ai;

          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.*;
          import android.graphics.Color;

          public class MainActivity extends Activity {
              public void onCreate(Bundle b) {
                  super.onCreate(b);

                  LinearLayout l = new LinearLayout(this);
                  l.setOrientation(LinearLayout.VERTICAL);
                  l.setBackgroundColor(Color.BLACK);

                  TextView t = new TextView(this);
                  t.setText("NEXORA AI READY 🚀");
                  t.setTextColor(Color.YELLOW);
                  t.setTextSize(24);

                  l.addView(t);
                  setContentView(l);
              }
          }
          EOF

      - run: |
          chmod +x gradlew || true
          ./gradlew assembleDebug || gradle assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/outputs/apk/debug/app-debug.apk
